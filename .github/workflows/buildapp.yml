# 主工作流：调用你刚才的打包脚本
name: 打包知乎++ APK
于:
  # 1. 手动点击按钮触发（最常用）
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        默认: 'nightly'
        输入: choice
        options:
          - nightly  # 每日测试版
          - release  # 正式版（需要打Tag）

  # 2. 打标签时自动发正式版（比如打 v1.0 标签）
  push:
    标签:
      - 'v*'

# 调用你写的打包工作流
jobs:
  build-apk:
    uses: ./.github/workflows/buildapp.yml  # 改成你的文件名！
    permissions:
      contents: write
    with:
      name: 正式构建
      args: ''
      minify: true          # 开启代码压缩（体积更小）
      release: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
      nightly_release: ${{ inputs.build_type == 'nightly' }}
    secrets: inherit
